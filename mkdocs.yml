site_name: AIレベルアップセッション
site_description: AIレベルアップセッション（営業向け・IBM Consulting Advantage / Copilot / IBM Bob）の設計・台本・教材・KPI
docs_dir: docs
exclude_docs: |
  slides/
extra_css:
  - assets/ibm.css
theme:
  name: material
  language: ja
  font: false              # フォントは extra_css の IBM Plex を使用
  features:
    - navigation.sections      # レベル別にセクション表示
    - navigation.top
    - navigation.footer
    - search.suggest
    - content.code.copy        # コードブロックにコピーボタン（プロンプト配布に便利）
    - toc.integrate
  palette:
    - scheme: default
      primary: black
      accent: blue
plugins:
  - search:
      lang: ja
markdown_extensions:
  - admonition                 # 「!!! note」で注意書きボックス
  - attr_list
  - md_in_html                 # ダッシュボードのHTML/JS埋め込み用
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets:        # 設計書のレベル定義をホーム等へ取り込む（単一の正）
      base_path: ["docs"]
      check_paths: true
nav:
  - ホーム: index.md
  - スライド（復習用）: slides-index.md
  - 設計:
      - カリキュラム設計書（正本）: design/curriculum.md
      - 設計の整合を保つ仕組み: design/maintenance.md
      - GitHub運用設計: design/github-ops.md
      - 講義モード設計: design/lecture-mode.md
  - 講師台本:
      - 台本ガイド（共通）: scripts/index.md
      - オンボーディング（全員必須）: scripts/onboarding.md
      - LV1 チャットAI使い倒し: scripts/l1.md
      - LV2 Bobでデモ: scripts/l2.md
      - LV3 使い分け: scripts/l3.md
      - エクストラ（希望者）Bobでアプリ: scripts/extra.md
  - 配布教材:
      - オンボーディング 会議トランスクリプト: materials/l1-transcript.md
      - LV1 リサーチ対象: materials/lv1-research-target.md
      - LV2 デモ業務テーマ: materials/lv2-demo-theme.md
      - LV3 案件ブリーフ: materials/l3-brief.md
  - テンプレート集: templates/index.md
  - KPIダッシュボード: dashboard/index.md
