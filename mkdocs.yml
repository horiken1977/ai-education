site_name: AIレベルアップセッション
site_description: AIレベルアップセッション（営業向け・IBM Consulting Advantage / Copilot / IBM Bob）の設計・台本・教材・KPI
docs_dir: docs
exclude_docs: |
  slides/
not_in_nav: |
  /dashboard/
  /design/
  /scripts/
  /materials/
  /toolkit/
extra_css:
  - assets/ibm.css
theme:
  name: material
  language: ja
  font: false              # フォントは extra_css の IBM Plex を使用
  features:
    - navigation.sections      # レベル別にセクション表示
    - navigation.top
    - navigation.footer
    - search.suggest
    - content.code.copy        # コードブロックにコピーボタン（プロンプト配布に便利）
    - toc.integrate
  palette:
    - scheme: default
      primary: black
      accent: blue
plugins:
  - search:
      lang: ja
markdown_extensions:
  - admonition                 # 「!!! note」で注意書きボックス
  - attr_list
  - md_in_html                 # ダッシュボードのHTML/JS埋め込み用
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets:        # 設計書のレベル定義をホーム等へ取り込む（単一の正）
      base_path: ["docs"]
      check_paths: true
nav:
  - ホーム: index.md
  - スライド（復習用）: slides-index.md
  - セッションの学び（復習）:
      - この記録について: review/index.md
      - オンボーディングの学び: review/onboarding.md
