name: Consistency check
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements.txt
      - name: MkDocs strict build（リンク/ナビ切れを検出）
        run: mkdocs build --strict
      - name: 廃止ファイルへの.mdリンクが残っていないか
        run: |
          # 実ファイル参照（.md付き）だけを検出。説明文中の語そのもの（maintenance.md等）は誤検知しない
          if grep -rnE "(curriculum-v2|dashboard-m365)\.md" docs mkdocs.yml; then
            echo "::error::削除済みファイルへの.mdリンクが残っています（上記）。リンクを正本へ更新してください。"
            exit 1
          fi
          echo "OK: 廃止ファイルへの.mdリンクなし"
      - name: 旧レベル名・旧プログラム名が残っていないか
        run: |
          # 設計書(curriculum.md)の最新表記からズレた旧表記を検出
          if grep -rnE "L1 初心者|L2 初級|L3 上級|初級〜中級|3つのレベル|初心者ゼロ|半数以上が上級|営業向けAI研修" docs mkdocs.yml; then
            echo "::error::旧レベル名/旧プログラム名が残っています（上記）。設計書(curriculum.md)の最新表記に合わせてください。"
            exit 1
          fi
          echo "OK: 旧表記なし"
      - name: データ重複・表示ダブり・ナビ重複の検出
        run: python3 tools/check_dup.py
